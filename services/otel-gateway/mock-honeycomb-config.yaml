receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  debug:
    verbosity: detailed
  file/traces:
    path: /exported/traces.json
  file/metrics:
    path: /exported/metrics.json

service:
  telemetry:
    logs:
      level: "debug"
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [file/traces, debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [file/metrics, debug]
