# see https://docs.honeycomb.io/getting-data-in/otel-collector/

extensions:
  basicauth/server:
    htpasswd:
      inline: |
          ${BASIC_AUTH_USER}:${BASIC_AUTH_PASSWORD}
  health_check:
    endpoint: 0.0.0.0:13133
    path: /healthz

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
        auth:
          authenticator: basicauth/server

processors:
  batch:

exporters:
  # The debug exporter replaces the old logging exporter and takes a verbosity
  # argument instead of a log level (detailed/normal/basic vs debug/info/warn).
  # https://github.com/open-telemetry/opentelemetry-collector/issues/11337
  # https://github.com/open-telemetry/opentelemetry-collector/tree/main/exporter/debugexporter
  debug:
    verbosity: "${LOG_VERBOSITY}"

  otlphttp/traces:
    endpoint: "${HONEYCOMB_ENDPOINT}"
    headers:
      x-honeycomb-team: "${HONEYCOMB_KEY}"
      # Do not set a dataset - let forwarding application set that.
      
  # for some reason, metrics requires an explicit dataset, so we have
  # a separate exporter config for that
  otlphttp/metrics:
    endpoint: "${HONEYCOMB_ENDPOINT}"
    headers:
      x-honeycomb-team: "${HONEYCOMB_KEY}"
      x-honeycomb-dataset: "${METRICS_DATASET}"

service:
  telemetry:
    logs:
      level: "${LOG_LEVEL}"
  extensions: [basicauth/server, health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/traces, debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/metrics, debug]
